    restart: unless-stopped
    environment:
      - "PEBBLE_VA_NOSLEEP=1"
    dns: 10.1.10.53
    ports:
      - 14000:14000  # HTTPS ACME API
      - 15000:15000  # HTTPS Management API
    networks:
      default: {}
    depends_on:
      bind9:
        condition: service_healthy
    command: pebble -config /configs/config.json -strict
  
