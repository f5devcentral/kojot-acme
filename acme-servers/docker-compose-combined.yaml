## ACME client system needs 4 IP addresses in /etc/netplan/<netplan>.yaml. Example:
## --------------------------
## network:
##   version: 2
##   renderer: networkd
##   ethernets:
##     ens6:
##       addresses: [ 10.1.10.50/24, 10.1.10.51/24, 10.1.10.52/24, 10.1.10.53/24 ]
## ==========================
## All services will technically be listening on all addresses, but can be treated as
## separate devices by virtue of port:
##  Pebble: 10.1.10.51:14000
##  Smallstep: 10.1.10.52:9000
##  Bind: 10.1.10.53:53

services:
  pebble:
    container_name: pebble
    build:
      context: .
      dockerfile_inline: |
        FROM golang:1.24-alpine AS builder
        RUN go install github.com/letsencrypt/pebble/v2/cmd/pebble@latest

        FROM alpine:latest
        COPY --from=builder /go/bin/pebble /usr/local/bin/pebble
        RUN mkdir -p /configs /test/certs
        COPY <<EOF /configs/config.json
        {
          "pebble": {
            "listenAddress": "0.0.0.0:14000",
            "managementListenAddress": "0.0.0.0:15000",
            "certificate": "/configs/tls-cert.pem",
            "privateKey": "/configs/tls-key.pem",
            "httpPort": 80,
            "tlsPort": 443,
            "ocspResponderURL": "",
            "externalAccountBindingRequired": false,
            "domainBlocklist": ["blocked-domain.example"],
            "keyAlgorithm": "rsa",
            "retryAfter": {
              "authz": 3,
              "order": 5
            }
          }
        }
        EOF
